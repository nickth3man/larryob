# NBA Full-History Completeness Contract
# This file defines the mandatory data scope for a complete NBA lineage database.

season_start: "1946-47"

required_game_types:
  - Preseason
  - Regular Season
  - Play-In
  - Playoffs

required_domains:
  - players
  - seasons
  - games
  - franchises
  - coaches
  - salaries

# Coverage expectations by domain
coverage:
  players:
    description: "All players who appeared in at least one NBA/BAA/ABA game"
    identifier_crosswalk: required
  seasons:
    description: "Complete season range from BAA founding to present"
    first_season: "1946-47"
  games:
    description: "All regular season, playoff, play-in, and preseason games"
  franchises:
    description: "All NBA/BAA/ABA franchise history entries"
  coaches:
    description: "Head coaches for each team-game combination (where available)"
  salaries:
    description: "Player salaries by season (where source data exists)"

# Violation thresholds
enforcement:
  missing_seasons_threshold: 0  # All seasons required
  missing_game_types_threshold: 0  # All game types required
  allow_unresolved_players: false  # Must have identifier crosswalk
