name: opencode-security-review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: opencode-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'opencode:security')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@0cf0294787322664c6d668fa5ab0a9ce26796f78
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/mistralai/devstral-2512
          use_github_token: true
          prompt: |
            Review this pull request with a strict security focus.
            Identify:
            - secret/token exposure risks
            - unsafe shell/subprocess/file handling patterns
            - insecure defaults in CI, auth, and permissions
            - dependency/update risks introduced by the changes

            Return only actionable findings with severity and concrete remediation steps.
