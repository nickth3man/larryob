name: opencode-data-integrity-review

on:
  pull_request:
    types: [opened, labeled]

concurrency:
  group: opencode-data-integrity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'opencode:data-integrity')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@0cf0294787322664c6d668fa5ab0a9ce26796f78
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/mistralai/devstral-2512
          use_github_token: true
          prompt: |
            Review this pull request for data integrity and analytics correctness.
            Focus on:
            - schema assumption mismatches (SQLite/DuckDB)
            - null/empty/unknown handling regressions
            - idempotency and replay safety in ETL stages
            - backfill ordering/dependency risks

            List concrete risks, impacted tables/views, and exact validation checks to add.