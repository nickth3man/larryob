name: opencode-second-opinion

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: opencode-second-opinion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'opencode:second-opinion')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/mistralai/devstral-2512
          use_github_token: true
          prompt: |
            Act as a second-opinion reviewer on this pull request.
            Focus on risks that the primary review might miss:
            - subtle correctness regressions and edge cases
            - hidden assumptions in data handling and pipeline stages
            - migration/backfill safety and idempotency concerns
            - missing or weak tests around changed behavior

            Output actionable findings only, grouped as:
            - Blocking
            - Non-blocking
