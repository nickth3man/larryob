name: commit-gate

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - dev

concurrency:
  group: commit-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ty check
        run: uv run ty check

      - name: Pytest
        run: uv run pytest -q

      - name: Pytest
        run: uv run pytest -q

      - name: Completeness audit
        run: uv run python scripts/completion_audit.py --db-path data/databases/nba_raw_data.db --enforce
        continue-on-error: true  # Don't fail CI until completeness is achieved
  quality_hook:
    name: quality-hook
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail if quality failed
        run: |
          echo "quality result: ${{ needs.quality.result }}"
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "quality job did not pass"
            exit 1
          fi

  opencode_review:
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@0cf0294787322664c6d668fa5ab0a9ce26796f78
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_github_token: true
          model: openrouter/mistralai/devstral-2512
          prompt: |
            Perform a strict and critical review of this pull request.
            Focus on:
            - behavioral regressions and correctness bugs
            - fragile edge cases and null/empty handling issues
            - missing tests for changed behavior
            - maintainability and readability problems

            Return concise, actionable findings with severity and a concrete fix.
